# docker-image.yml

name: docker release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/arma3docker:latest
            ghcr.io/${{ github.repository_owner }}/arma3docker:${{ github.ref_name }}

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
